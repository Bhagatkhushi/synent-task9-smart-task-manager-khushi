<!DOCTYPE html>

<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h2>Login Page</h2>

<form action="/" method="POST">

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    {% if error %}
    <p style="color:red;">
        {{ error }}
    </p>
    {% endif %}

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register">
    Don't have an account? Register Here
</a>

</body>
</html>
