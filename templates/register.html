<!DOCTYPE html>

<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h2>Register Page</h2>

<form action="/register" method="POST">
    {% if error %}
    <p style="color:red; font-weight:bold;">
        {{ error }}
    </p>
    {% endif %}

    <input type="text"
           name="name"
           placeholder="Full Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="/">
    Already have an account? Login
</a>

</body>
</html>
