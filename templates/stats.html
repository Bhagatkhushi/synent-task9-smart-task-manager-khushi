<!DOCTYPE html>
<html>
<head>
    <title>Task Statistics</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📊 Task Statistics</h1>

    <div class="stats-container">

        <div class="stat-card">
            <h2>📋</h2>
            <h3>{{ total_tasks }}</h3>
            <p>Total Tasks</p>
        </div>

        <div class="stat-card">
            <h2>✅</h2>
            <h3>{{ completed_tasks }}</h3>
            <p>Completed</p>
        </div>

        <div class="stat-card">
            <h2>⏳</h2>
            <h3>{{ pending_tasks }}</h3>
            <p>Pending</p>
        </div>

    </div>

    <h2>📈 Progress: {{ progress }}%</h2>

    <div class="progress-bar">
        <div class="progress-fill"style="width: {{ progress }}%;"></div>
    </div>

    <br>

    <a href="/dashboard">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
